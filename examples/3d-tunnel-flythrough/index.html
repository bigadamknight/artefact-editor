<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1080px; height: 1080px; overflow: hidden;
        background: #08080c;
        font-family: "Inter", system-ui, sans-serif;
        color: #fafaf7;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        position: relative; width: 1080px; height: 1080px; overflow: hidden;
        perspective: 1200px;
        perspective-origin: 50% 50%;
      }

      /* Vignette + subtle dust */
      #root::after {
        content: ""; position: absolute; inset: 0; pointer-events: none;
        background: radial-gradient(circle at 50% 50%, transparent 35%, rgba(0,0,0,0.7) 100%);
        z-index: 30;
      }

      .scene { position: absolute; inset: 0; transform-style: preserve-3d; }

      /* Calendar tunnel */
      #tunnel { transform-style: preserve-3d; }
      .cal {
        position: absolute;
        width: 280px; height: 320px;
        left: 50%; top: 50%;
        margin-left: -140px; margin-top: -160px;
        background: #16171d;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        transform-style: preserve-3d;
        will-change: transform, opacity, filter;
      }
      .cal .month {
        font-weight: 700; font-size: 22px;
        padding: 18px 22px 10px;
        color: #fafaf7;
        letter-spacing: -0.01em;
      }
      .cal .grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
        padding: 4px 18px 18px;
      }
      .cal .day {
        aspect-ratio: 1;
        background: rgba(255,255,255,0.04);
        border-radius: 4px;
        display: flex; align-items: center; justify-content: center;
        font-size: 11px;
        color: rgba(250,250,247,0.55);
      }
      .cal .day.x {
        background: rgba(239, 68, 68, 0.22);
        color: #fca5a5;
        text-decoration: line-through;
      }
      .cal .day.x::after {
        content: ""; position: absolute;
      }

      /* Foreground text */
      #text-layer {
        position: absolute; inset: 0; z-index: 20;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 18px;
        pointer-events: none;
      }
      .lede {
        font-weight: 600; font-size: 36px; letter-spacing: -0.01em;
        color: rgba(250,250,247,0.85);
        opacity: 0;
      }
      .slam {
        font-weight: 900; font-size: 168px; letter-spacing: -0.05em;
        color: #ef4444;
        text-transform: lowercase;
        opacity: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"
         data-composition-id="main"
         data-start="0"
         data-duration="7"
         data-width="1080"
         data-height="1080">

      <div class="scene">
        <div id="tunnel"></div>
      </div>

      <div id="text-layer">
        <div class="lede" data-edit-id="blk_lede">we've counted. it's been months.</div>
        <div class="slam" data-edit-id="blk_slam">intervention.</div>
      </div>
    </div>

    <script>
      // Generate calendar cards programmatically — each one at a varied
      // X/Y/Z so the tunnel feels organic rather than gridded.
      const tunnel = document.getElementById("tunnel");
      const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
      const COUNT = 18;
      function rand(min, max) { return min + Math.random() * (max - min); }

      for (let i = 0; i < COUNT; i++) {
        const cal = document.createElement("div");
        cal.className = "cal";
        // Stagger X/Y so cards aren't all centred. Keep them within frame at z=0.
        const x = rand(-360, 360);
        const y = rand(-360, 360);
        const rotY = rand(-25, 25);
        const rotX = rand(-12, 12);
        cal.dataset.dx = x;
        cal.dataset.dy = y;
        cal.dataset.rotY = rotY;
        cal.dataset.rotX = rotX;

        // Build calendar contents
        const month = document.createElement("div");
        month.className = "month";
        month.textContent = months[i % 12] + " 2026";
        cal.appendChild(month);

        const grid = document.createElement("div");
        grid.className = "grid";
        for (let d = 1; d <= 28; d++) {
          const day = document.createElement("div");
          day.className = "day x"; // every day struck through — the visual joke
          day.textContent = d;
          grid.appendChild(day);
        }
        cal.appendChild(grid);
        tunnel.appendChild(cal);
      }

      // Initial state: cards far behind the camera.
      gsap.set(".cal", {
        x: (i, el) => parseFloat(el.dataset.dx),
        y: (i, el) => parseFloat(el.dataset.dy),
        z: -3000,
        rotationY: (i, el) => parseFloat(el.dataset.rotY),
        rotationX: (i, el) => parseFloat(el.dataset.rotX),
        opacity: 0,
      });

      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Fade in the lede text
      tl.to(".lede", { opacity: 1, duration: 0.5, ease: "power2.out" }, 0.2);

      // The fly-through. Each card travels from far Z (-3000) past the
      // camera (z=1500) over ~3.5s, with stagger so they arrive in waves.
      tl.to(".cal", {
        z: 1500,
        opacity: 1,
        duration: 4.0,
        ease: "power2.in",
        stagger: { each: 0.12, from: "random" },
      }, 0.4);

      // Mid-flight, fade lede out
      tl.to(".lede", { opacity: 0, duration: 0.4 }, 3.6);

      // Slam: intervention text smashes in at the climax of the fly-through.
      tl.fromTo(".slam",
        { opacity: 0, scale: 1.6, rotationX: -25 },
        { opacity: 1, scale: 1, rotationX: 0, duration: 0.45, ease: "expo.out" },
        4.2);

      // Hold, then fade everything.
      tl.to([".slam"], { opacity: 0, duration: 0.5, ease: "power2.in" }, 6.2);
      tl.to(".cal", { opacity: 0, duration: 0.5 }, 6.2);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
